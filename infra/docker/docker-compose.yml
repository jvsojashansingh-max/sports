version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: sports-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sports
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: sports-redis
    ports:
      - '6379:6379'

volumes:
  pgdata:
