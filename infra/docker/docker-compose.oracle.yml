version: '3.9'

services:
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
    env_file:
      - ../../.env.production
    command: ['pnpm', '--filter', '@sports/api', 'exec', 'prisma', 'migrate', 'deploy']
    restart: 'no'

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
    env_file:
      - ../../.env.production
    command: ['pnpm', '--filter', '@sports/api', 'start']
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - '4000'
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
    env_file:
      - ../../.env.production
    command: ['pnpm', '--filter', '@sports/worker', 'start']
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
